<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechTube Admin</title>

<link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>TechTube Admin Login</h2>

    <input type="text" id="adminUsername" placeholder="Username">
    <input type="password" id="adminPassword" placeholder="Password">

    <button id="loginBtn">Login</button>
    <p id="loginError"></p>
  </div>
</div>

<div class="admin-container" id="adminDashboard">
<button id="logoutBtn">Logout</button>
<h1>🎬 TechTube Admin Dashboard</h1>

<form id="videoForm">

<input
type="text"
id="title"
placeholder="Video Title"
required>

<input
type="text"
id="category"
placeholder="Category (AI, Programming, Cybersecurity)"
required>

<input
type="text"
id="duration"
placeholder="Duration (e.g. 10:35)"
required>

<input
type="text"
id="thumbnail"
placeholder="Thumbnail URL"
required>

<input
type="text"
id="video"
placeholder="Video URL"
required>

<label>Or Upload Video File</label>
<input type="file" id="videoFile" accept="video/*">

<textarea
id="description"
placeholder="Video Description"
required>
</textarea>

<button type="submit" id="submitBtn">
  Upload Video
</button>

<button type="button" id="cancelEditBtn" style="display:none;">
  Cancel Edit
</button>

</form>

<hr>

<h2>Uploaded Videos</h2>

<div id="videoList"></div>

</div>

<script src="admin.js"></script>

</body>
</html>
